<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tab Classifier - Settings</title>
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <div class="container">
        <header class="page-header">
            <p class="eyebrow">Extension Settings</p>
            <h1>AI Tab Classifier</h1>
            <p class="page-subtitle">Choose a provider, set your model, and save.</p>
        </header>

        <div class="section section-card">
            <h2>API Configuration</h2>
            <div class="form-group">
                <label for="apiProvider">API Provider:</label>
                <div class="provider-tabs" role="tablist" aria-label="API Provider">
                    <button type="button" class="provider-tab" data-provider="gemini" role="tab"
                        aria-selected="false">Google Gemini</button>
                    <button type="button" class="provider-tab" data-provider="openai" role="tab"
                        aria-selected="false">OpenAI</button>
                    <button type="button" class="provider-tab" data-provider="anthropic" role="tab"
                        aria-selected="false">Anthropic (Claude)</button>
                </div>
            </div>

            <div class="form-group">
                <label for="apiKey">API Key:</label>
                <input type="password" id="apiKey" placeholder="Enter your API Key">
                <small>Your API Key is securely stored locally and never uploaded to any server</small>
            </div>

            <div class="form-group" id="apiEndpointGroup" style="display: none;">
                <label for="apiEndpoint">Base URL:</label>
                <input type="text" id="apiEndpoint" placeholder="https://api.openai.com/v1">
                <small>Leave blank to use the official base URL.</small>
            </div>

            <div class="form-group">
                <label for="model">Model:</label>
                <input type="text" id="model" placeholder="gpt-4o-mini">
                <small>Different models may have different performance and costs</small>
            </div>

            <div id="configStatus" class="status"></div>
        </div>
    </div>

    <script src="options.js"></script>
</body>

</html>
